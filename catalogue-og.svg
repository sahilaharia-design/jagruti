<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dot grid texture -->
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1" fill="white" opacity="0.028"/>
    </pattern>
    <!-- Radial blue ambient on right -->
    <radialGradient id="rightAmb" cx="79%" cy="49%" r="38%">
      <stop offset="0%" stop-color="#1B5FA8" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#0B1929" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip for full canvas -->
    <clipPath id="canvas">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="#0B1929"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#rightAmb)"/>

  <!-- Footer bar bg -->
  <rect y="572" width="1200" height="58" fill="#060d18"/>

  <!-- Left accent strip -->
  <rect x="0" y="0" width="4" height="630" fill="#1B5FA8"/>

  <!-- ── ENGINEERING CORNER MARKS (registration / technical drawing feel) ── -->
  <g stroke="#1B5FA8" stroke-width="1.2" opacity="0.35" fill="none">
    <!-- Top-left -->
    <polyline points="28,14 14,14 14,28"/>
    <!-- Top-right -->
    <polyline points="1172,14 1186,14 1186,28"/>
    <!-- Bottom-left (above footer) -->
    <polyline points="28,558 14,558 14,544"/>
    <!-- Bottom-right -->
    <polyline points="1172,558 1186,558 1186,544"/>
  </g>

  <!-- ── RIGHT: INDUCTION BASE PLATE (concentric circles) ── -->
  <!-- centered at (952, 308) -->

  <!-- Outer atmosphere haze -->
  <circle cx="952" cy="308" r="285" fill="none" stroke="white" stroke-width="1" opacity="0.04" clip-path="url(#canvas)"/>

  <!-- Ring 1 – outer plate boundary -->
  <circle cx="952" cy="308" r="248" fill="none" stroke="white" stroke-width="1.5" opacity="0.14" clip-path="url(#canvas)"/>

  <!-- Very subtle plate fill -->
  <circle cx="952" cy="308" r="244" fill="rgba(255,255,255,0.018)" clip-path="url(#canvas)"/>

  <!-- Ring 2 – blue accent (embossed zone) -->
  <circle cx="952" cy="308" r="210" fill="none" stroke="#1B5FA8" stroke-width="2" opacity="0.45" clip-path="url(#canvas)"/>

  <!-- Ring 3 -->
  <circle cx="952" cy="308" r="168" fill="none" stroke="white" stroke-width="1.5" opacity="0.18" clip-path="url(#canvas)"/>

  <!-- Ring 4 – blue accent (inner emboss) -->
  <circle cx="952" cy="308" r="128" fill="none" stroke="#3B8FD8" stroke-width="2" opacity="0.45" clip-path="url(#canvas)"/>

  <!-- Ring 5 -->
  <circle cx="952" cy="308" r="86" fill="none" stroke="white" stroke-width="1.2" opacity="0.22" clip-path="url(#canvas)"/>

  <!-- Center hole ring (blue) -->
  <circle cx="952" cy="308" r="38" fill="none" stroke="#1B5FA8" stroke-width="2.5" opacity="0.75"/>

  <!-- Center hole fill -->
  <circle cx="952" cy="308" r="24" fill="#1B5FA8" opacity="0.22"/>
  <circle cx="952" cy="308" r="12" fill="#1B5FA8" opacity="0.45"/>

  <!-- Radial cross lines (machined/engineering look) -->
  <g stroke="white" stroke-width="0.8" opacity="0.06" clip-path="url(#canvas)">
    <line x1="952" y1="23" x2="952" y2="593"/>
    <line x1="667" y1="308" x2="1200" y2="308"/>
    <line x1="750" y1="110" x2="1154" y2="506"/>
    <line x1="1154" y1="110" x2="750" y2="506"/>
  </g>

  <!-- Dimension tick marks (compass points, technical drawing style) -->
  <g stroke="#1B5FA8" stroke-width="1.2" opacity="0.55">
    <line x1="952" y1="56"  x2="952" y2="70"/>
    <line x1="952" y1="546" x2="952" y2="560"/>
    <line x1="700" y1="308" x2="714" y2="308"/>
    <!-- right side tick would be off-canvas, skip -->
  </g>

  <!-- Small annotation dots at ring intersections -->
  <circle cx="952" cy="60"  r="2.5" fill="#1B5FA8" opacity="0.6"/>
  <circle cx="952" cy="556" r="2.5" fill="#1B5FA8" opacity="0.6"/>
  <circle cx="704" cy="308" r="2.5" fill="#1B5FA8" opacity="0.6"/>

  <!-- ── LEFT: TEXT CONTENT ── -->

  <!-- Brand label -->
  <text x="72" y="86"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="10.5" font-weight="600"
    letter-spacing="4.5"
    fill="white" opacity="0.38"
    text-anchor="start">JAGRUTI STEELS PVT. LTD.</text>

  <!-- Thin rule under brand label -->
  <line x1="72" y1="100" x2="348" y2="100" stroke="#1B5FA8" stroke-width="1" opacity="0.45"/>

  <!-- Hero heading: "Product" -->
  <text x="72" y="194"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="78" font-weight="700"
    letter-spacing="-2"
    fill="white" opacity="0.97"
    text-anchor="start">Product</text>

  <!-- Hero heading: "Catalogue" -->
  <text x="72" y="284"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="78" font-weight="700"
    letter-spacing="-2"
    fill="white" opacity="0.97"
    text-anchor="start">Catalogue</text>

  <!-- Blue accent underline -->
  <rect x="72" y="298" width="130" height="3.5" fill="#1B5FA8" rx="2"/>

  <!-- Material grades -->
  <text x="72" y="344"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="12.5" font-weight="700"
    letter-spacing="3.5"
    fill="#3B8FD8" opacity="0.95"
    text-anchor="start">SS 430  ·  SS 304  ·  MS</text>

  <!-- Description line 1 -->
  <text x="72" y="382"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="14.5" font-weight="400"
    fill="white" opacity="0.48"
    text-anchor="start">Precision stamped &amp; deep drawn components</text>

  <!-- Description line 2 -->
  <text x="72" y="404"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="14.5" font-weight="400"
    fill="white" opacity="0.48"
    text-anchor="start">for global cookware and appliance brands.</text>

  <!-- ── CATEGORY TAGS ROW 1 ── -->

  <!-- Tag 1: Induction Base Plates (highlighted) -->
  <rect x="72" y="430" width="180" height="28" rx="4"
    fill="rgba(27,95,168,0.3)" stroke="#1B5FA8" stroke-width="1.2"/>
  <text x="162" y="449"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="700" letter-spacing="0.3"
    fill="white" opacity="0.92" text-anchor="middle">Induction Base Plates</text>

  <!-- Tag 2: Pressure Cooker Parts -->
  <rect x="262" y="430" width="164" height="28" rx="4"
    fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="344" y="449"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.3"
    fill="white" opacity="0.65" text-anchor="middle">Pressure Cooker Parts</text>

  <!-- Tag 3: Lids & Support Parts -->
  <rect x="436" y="430" width="148" height="28" rx="4"
    fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="510" y="449"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.3"
    fill="white" opacity="0.65" text-anchor="middle">Lids &amp; Support Parts</text>

  <!-- ── CATEGORY TAGS ROW 2 ── -->

  <!-- Tag 4: Deep Drawn Vessels -->
  <rect x="72" y="469" width="152" height="28" rx="4"
    fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="148" y="488"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.3"
    fill="white" opacity="0.65" text-anchor="middle">Deep Drawn Vessels</text>

  <!-- Tag 5: Hospitality Products -->
  <rect x="234" y="469" width="158" height="28" rx="4"
    fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="313" y="488"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.3"
    fill="white" opacity="0.65" text-anchor="middle">Hospitality Products</text>

  <!-- Tag 6: Custom OEM Parts -->
  <rect x="402" y="469" width="140" height="28" rx="4"
    fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="472" y="488"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.3"
    fill="white" opacity="0.65" text-anchor="middle">Custom OEM Parts</text>

  <!-- ── FOOTER BAR ── -->

  <!-- Separator line -->
  <line x1="0" y1="572" x2="1200" y2="572" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Left footer: establishment info -->
  <text x="72" y="606"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="10.5" font-weight="600"
    letter-spacing="2.8"
    fill="white" opacity="0.32"
    text-anchor="start">OEM MANUFACTURING SINCE 1974  ·  MUMBAI &amp; GUJARAT, INDIA</text>

  <!-- Right footer: website -->
  <text x="1132" y="606"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="11" font-weight="700"
    letter-spacing="0.5"
    fill="#3B8FD8" opacity="0.85"
    text-anchor="end">jagrutisteels.com</text>

</svg>
